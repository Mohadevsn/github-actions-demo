name: CI - Automatic test
#  The pipeline is triggered whenever a push or pull request occure on target branch
on: 
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
# ─────────────────────────────────────────
#  Job 1: TEST
# ─────────────────────────────────────────
    test: 
        name: 🧪 Test
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with: 
                node-version: '20'
                cache: 'npm'

            - name: Install dependancies
              run: npm install

            - name: Start test
              run: npm test
# ─────────────────────────────────────────
#  Job 2: BUILD
# ─────────────────────────────────────────
    build: 
        name: 🔨 Build
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with: 
                node-version: '20'
                cache: 'npm'

            - name: Install dependancies
              run: npm install

            - name: Build simulation
              run: |
                mkdir -p dist
                cp src/index.js dist/index.js
                echo "Build is successfull : $(date)" > dist/build-info.txt
                echo "✅ Artefact successfully created in /dist"
            
            - name: Upload artefacts
              uses: actions/upload-artifact@v4
              with:
                name: build-output
                path: dist/

# ─────────────────────────────────────────
#  Job 3: DEPLOY
# ─────────────────────────────────────────
    deploy:
        name: 🚀 Deployment
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Download artefect
              uses: actions/download-artefact@v4
              with: 
                name: build-output
                path: dist/
            
            - name: Deployment to production (GO LIVE)
              run: |
                echo "Logging to remote server..."
                sleep 2
                echo "Tranfering files..."
                sleep 2
                echo "Reloading services..."
                sleep 1
                echo "✅ Deployment terminated with succes"

            - name: Deployment's summary 
              run: |
                echo "## Successfull deployment" > $GITHUB_STEP_SUMMARY
                echo "- **Commit** : ${{github.sha}}" > $GITHUB_STEP_SUMMARY
                echo "- **Author** : ${{github.actor}}" > $GITHUB_STEP_SUMMARY
                echo "- **Date** : $(date)" > $GITHUB_STEP_SUMMARY
                echo "- **URL** : https://our-app.exemple.com" > $GITHUB_STEP_SUMMARY
